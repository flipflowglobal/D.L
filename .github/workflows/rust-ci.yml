# ─────────────────────────────────────────────────────────────────────────────
# Rust CI — lint, test, and build dex-oracle and tx-engine crates
# ─────────────────────────────────────────────────────────────────────────────

name: Rust CI

on:
  push:
    branches: ["**"]
    paths:
      - "dex-oracle/**"
      - "tx-engine/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "dex-oracle/**"
      - "tx-engine/**"
      - ".github/workflows/rust-ci.yml"

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lint (clippy + fmt) ──────────────────────────────────────────────────
  lint:
    name: Rust Lint (${{ matrix.crate }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        crate: [dex-oracle, tx-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.crate }}/target
          key: rust-${{ matrix.crate }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.crate)) }}
          restore-keys: rust-${{ matrix.crate }}-

      - name: Check formatting
        run: cargo fmt --check --manifest-path ${{ matrix.crate }}/Cargo.toml

      - name: Clippy lint
        run: cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml --all-targets -- -D warnings

  # ── Build (release) ──────────────────────────────────────────────────────
  build:
    name: Rust Build (${{ matrix.crate }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        crate: [dex-oracle, tx-engine]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.crate }}/target
          key: rust-${{ matrix.crate }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.crate)) }}
          restore-keys: rust-${{ matrix.crate }}-

      - name: Build release binary
        run: cargo build --release --manifest-path ${{ matrix.crate }}/Cargo.toml

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.crate }}-linux-x86_64
          path: ${{ matrix.crate }}/target/release/${{ matrix.crate }}
          retention-days: 7
