name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install pyflakes

      - name: Check for syntax / import errors (pyflakes)
        run: |
          python -m pyflakes engine/ intelligence/ vault/ tests/ main.py tools.py database.py setup_wallet.py trade.py config.py

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all module imports
        run: |
          python -c "
          import sys
          modules = [
              'engine.market_data',
              'engine.portfolio',
              'engine.risk_manager',
              'engine.strategies.mean_reversion',
              'engine.arbitrage.arbitrage_scanner',
              'engine.dex.liquidity_monitor',
              'engine.dex.uniswap_v3',
              'engine.dex.sushiswap',
              'engine.execution.executor',
              'engine.execution.swap_executor',
              'engine.execution.web3_executor',
              'intelligence.memory',
              'intelligence.autonomy',
              'vault.wallet_config',
              'vault.wallet_manager',
              'tools',
              'database',
              'main',
              'config',
          ]
          failed = []
          for m in modules:
              try:
                  __import__(m)
              except Exception as e:
                  failed.append(f'{m}: {e}')
          if failed:
              print('IMPORT FAILURES:')
              for f in failed:
                  print(' ', f)
              sys.exit(1)
          print(f'All {len(modules)} modules import successfully')
          "

      - name: Run tests
        run: pytest --tb=short -q

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bot
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
