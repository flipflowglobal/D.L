name: CI/Lint Gate

on:
  pull_request:
    branches: [main, develop]
    paths-ignore: ['**.md', 'docs/**']

concurrency:
  group: ci-lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python setup ─────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # ── Cache (Cargo registry + target dirs) ─────────────────────────────
      - name: Restore Cache (lint tools + cargo)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dex-oracle/target
            tx-engine/target
          key: lint-${{ runner.os }}-${{ hashFiles('dex-oracle/Cargo.lock', 'tx-engine/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-

      # ── Install linters (deterministic versions) ─────────────────────────
      - name: Install linters
        run: |
          pip install pyflakes
          cargo install --locked cargo-audit
          npm install -g solhint@5

      # ── Parallel Lint Fan-out ────────────────────────────────────────────
      - name: Parallel Lint Fan-out
        run: |
          set +e  # allow individual lint steps to fail without aborting

          # ── Python: syntax + import errors ──────────────────────────────
          python -m pyflakes \
            engine/ intelligence/ vault/ tests/ \
            kernel/ agents/ core/ \
            main.py tools.py database.py setup_wallet.py trade.py config.py \
            aureon_server.py aureon_onthedl.py blockchain_aureon.py \
            DL_SYSTEM/core/ DL_SYSTEM/agents/ \
            > pyflakes.out 2>&1 || true

          # ── Solidity: style + gas + invariants ──────────────────────────
          solhint 'contracts/**/*.sol' --config .solhint.json \
            > solhint.out 2>&1 || true

          # ── Rust: clippy (dex-oracle + tx-engine) ───────────────────────
          (cd dex-oracle && cargo clippy --all-targets -- -D warnings) \
            > clippy.out 2>&1 || true
          (cd tx-engine  && cargo clippy --all-targets -- -D warnings) \
            >> clippy.out 2>&1 || true

          # ── Security: cargo audit ───────────────────────────────────────
          (cd dex-oracle && cargo audit --json) > audit-dex.json 2>/dev/null || true
          (cd tx-engine  && cargo audit --json) > audit-tx.json  2>/dev/null || true

          # Merge audit results into a single file
          python3 -c "
          import json, pathlib
          results = []
          for f in ['audit-dex.json', 'audit-tx.json']:
              p = pathlib.Path(f)
              if p.exists() and p.stat().st_size > 0:
                  try:
                      results.append(json.loads(p.read_text()))
                  except json.JSONDecodeError:
                      pass
          pathlib.Path('audit.json').write_text(json.dumps(results, indent=2))
          "

          # ── AI-native alignment scanner (custom) ────────────────────────
          python3 scripts/lint_alignment.py --model embeddings-v3 \
            > alignment.out 2>&1 || true

      # ── Aggregate & Merkle Root ──────────────────────────────────────────
      - name: Aggregate & Merkle Root
        id: merkle
        run: |
          python3 -m scripts.merkle_lint \
            --inputs pyflakes.out solhint.out clippy.out audit.json alignment.out \
            > merkle.json
          cat merkle.json
          echo "merkle_root=$(python3 -c "import json; print(json.load(open('merkle.json'))['root'])")" >> $GITHUB_OUTPUT

      # ── Enforce Gate ─────────────────────────────────────────────────────
      - name: Enforce Gate
        run: |
          # Check individual critical outputs for real failures
          FAILED=0

          # pyflakes errors are blocking
          if [ -s pyflakes.out ]; then
            echo "::group::pyflakes findings"
            cat pyflakes.out
            echo "::endgroup::"
            FAILED=1
          fi

          # Clippy warnings treated as errors
          if grep -q "^error" clippy.out 2>/dev/null; then
            echo "::group::clippy errors"
            cat clippy.out
            echo "::endgroup::"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Lint gate failed. Full report: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 1
          fi

          echo "✅ Lint gate passed — Merkle root: ${{ steps.merkle.outputs.merkle_root }}"

      # ── Attest Success (summary) ─────────────────────────────────────────
      - name: Attest Success
        if: success()
        run: |
          echo "### ✅ CI/Lint Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| pyflakes | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| solhint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo-audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| alignment | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Merkle root:** \`${{ steps.merkle.outputs.merkle_root }}\`" >> $GITHUB_STEP_SUMMARY
