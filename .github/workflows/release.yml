# ─────────────────────────────────────────────────────────────────────────────
# Release — triggered by semver tags (v1.0.0, v2.3.1, etc.)
# Builds Docker images, creates GitHub Release with changelog
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Validate ─────────────────────────────────────────────────────────────
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install pyflakes
          python -m pyflakes \
            engine/ intelligence/ vault/ tests/ \
            kernel/ agents/ core/ \
            main.py tools.py database.py setup_wallet.py trade.py config.py \
            aureon_server.py aureon_onthedl.py blockchain_aureon.py \
            DL_SYSTEM/core/ DL_SYSTEM/agents/

      - name: Test
        run: pytest --tb=short -q

  # ── Docker publish ───────────────────────────────────────────────────────
  docker-publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, docker-publish]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## What's Changed" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          git log --oneline --no-merges "${PREV_TAG}..HEAD" | \
            sed 's/^/- /' >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "**Docker image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}\`" >> /tmp/changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
