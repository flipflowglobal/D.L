[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short --strict-markers
filterwarnings =
    ignore:websockets.legacy is deprecated:DeprecationWarning
    ignore::DeprecationWarning:websockets
    ignore::DeprecationWarning:fastapi
markers =
    mainnet: live mainnet test — requires RPC_URL and PRIVATE_KEY env vars
    slow: test takes more than 5 seconds
    integration: requires external services to be running

# CI additions (written by copilot-setup-steps)
addopts = -q --tb=short --timeout=30 --strict-markers
timeout = 30
markers =
    mainnet: live mainnet test — requires RPC_URL and PRIVATE_KEY
    slow: test takes more than 5 s
    integration: requires external services

