[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short --strict-markers
timeout = 30
filterwarnings =
    ignore:websockets.legacy is deprecated:DeprecationWarning
    ignore::DeprecationWarning:websockets
markers =
    mainnet: live mainnet test — requires RPC_URL and PRIVATE_KEY env vars
    slow: test takes more than 5 seconds
    integration: requires external services to be running
